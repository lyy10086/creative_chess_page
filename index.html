<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D 象棋沙盘</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #d9d6cf;
      --panel: #f4f0e7;
      --panel-strong: #2c302c;
      --ink: #262622;
      --muted: #6f6b63;
      --line: rgba(37, 34, 28, 0.16);
      --red: #a63227;
      --green: #1e6f58;
      --brass: #b4853a;
      --board-scale: 1;
      --piece-scale: 1;
      --page-scale: 1;
      --rotate-x: 0deg;
      --rotate-y: 0deg;
      --rotate-z: 0deg;
      --shadow-x: 18px;
      --shadow-y: 24px;
      --shadow-scale-x: 1;
      --shadow-scale-y: 0.74;
      --shadow-alpha: 0.32;
      --shadow-rotate: 0deg;
      --piece-shadow-x: 7px;
      --piece-shadow-y: 12px;
      --piece-shadow-alpha: 0.34;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      background:
        linear-gradient(135deg, rgba(30, 111, 88, 0.15), transparent 32%),
        linear-gradient(315deg, rgba(166, 50, 39, 0.14), transparent 34%),
        var(--bg);
      color: var(--ink);
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 68px;
      padding: 14px clamp(16px, 4vw, 42px);
      background: rgba(244, 240, 231, 0.88);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      font-weight: 800;
      letter-spacing: 0;
      color: var(--panel-strong);
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 38px;
      aspect-ratio: 1;
      border-radius: 8px;
      background: linear-gradient(145deg, var(--red), #713025);
      color: #f8ead8;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.28), 0 8px 18px rgba(67, 35, 22, 0.18);
      flex: 0 0 auto;
    }

    .brand-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: clamp(18px, 2.2vw, 24px);
    }

    .quick-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .action-button {
      min-height: 38px;
      padding: 0 14px;
      border-radius: 8px;
      background: var(--panel-strong);
      color: #fff8ec;
      box-shadow: 0 8px 18px rgba(37, 38, 32, 0.14);
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .action-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(37, 38, 32, 0.18);
    }

    .action-button.secondary {
      background: #f7f3eb;
      color: var(--panel-strong);
      box-shadow: inset 0 0 0 1px var(--line), 0 8px 18px rgba(37, 38, 32, 0.08);
    }

    .action-button.toggle-active {
      background: var(--green);
      color: #fffaf0;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(268px, 340px);
      gap: clamp(18px, 3vw, 34px);
      align-items: stretch;
      padding: clamp(16px, 3vw, 34px);
    }

    .stage {
      min-width: 0;
      min-height: calc(100vh - 128px);
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 8px;
    }

    .scene-space {
      position: relative;
      display: grid;
      place-items: center;
      width: min(66vw, 760px);
      min-width: 330px;
      aspect-ratio: 1055 / 1491;
      perspective: 1200px;
      transform: scale(var(--page-scale));
      transform-origin: center;
      transition: transform 260ms ease;
      touch-action: none;
    }

    .ground-shadow {
      position: absolute;
      left: 50%;
      top: 54%;
      width: 78%;
      height: 72%;
      border-radius: 38%;
      background: rgba(15, 15, 13, var(--shadow-alpha));
      filter: blur(28px);
      transform:
        translate(-50%, -50%)
        translate(var(--shadow-x), var(--shadow-y))
        rotate(var(--shadow-rotate))
        scale(var(--shadow-scale-x), var(--shadow-scale-y));
      transform-origin: center;
      transition: transform 260ms ease, opacity 260ms ease, background 260ms ease;
      pointer-events: none;
    }

    .board-plane {
      position: relative;
      width: min(58vw, 650px);
      min-width: 310px;
      aspect-ratio: 1055 / 1491;
      transform:
        rotateX(var(--rotate-x))
        rotateY(var(--rotate-y))
        rotateZ(var(--rotate-z))
        scale(var(--board-scale));
      transform-style: preserve-3d;
      transform-origin: center center;
      transition: transform 260ms ease;
      touch-action: none;
      user-select: none;
      cursor: grab;
    }

    .board-plane::before {
      content: "";
      position: absolute;
      inset: 1.2% 1.4%;
      z-index: -2;
      border-radius: 7px;
      background: linear-gradient(120deg, #6c5944, #332b24 68%, #201c18);
      transform: translate3d(14px, 18px, -28px);
      box-shadow:
        0 20px 34px rgba(26, 24, 20, 0.28),
        inset 0 -14px 16px rgba(0, 0, 0, 0.24);
    }

    .board-plane::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 7px;
      pointer-events: none;
      background:
        linear-gradient(130deg, rgba(255, 255, 255, 0.24), transparent 30%),
        linear-gradient(310deg, rgba(20, 17, 14, 0.18), transparent 36%);
      mix-blend-mode: soft-light;
      transform: translateZ(4px);
      z-index: 5;
    }

    .board-plane.dragging,
    .board-plane.rotating {
      transition: none;
      cursor: grabbing;
    }

    .board-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 7px;
      object-fit: cover;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.35),
        inset 0 0 0 7px rgba(73, 48, 31, 0.1);
      transform: translateZ(0);
      pointer-events: none;
    }

    .pieces-layer {
      position: absolute;
      inset: 0;
      transform: translateZ(34px);
      transform-style: preserve-3d;
      z-index: 8;
      pointer-events: none;
    }

    .piece {
      position: absolute;
      width: 9.6%;
      aspect-ratio: 1;
      transform:
        translate(-50%, -50%)
        translateZ(30px)
        scale(var(--piece-scale));
      transform-origin: 50% 50%;
      transition:
        left 180ms ease,
        top 180ms ease,
        transform 220ms ease,
        filter 220ms ease;
      pointer-events: auto;
      cursor: grab;
      touch-action: none;
      z-index: calc(20 + var(--row-index));
    }

    .piece::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 2%;
      width: 68%;
      height: 20%;
      border-radius: 50%;
      background: rgba(18, 17, 14, 0.24);
      filter: blur(5px);
      transform:
        translate(-50%, 22%)
        translate(var(--piece-shadow-x), var(--piece-shadow-y))
        scale(1.05, 0.54);
      opacity: var(--piece-shadow-alpha);
      pointer-events: none;
      z-index: -1;
    }

    .piece-art {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16%;
      background: #e2d8ca;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.32),
        inset 0 -6px 8px rgba(38, 27, 19, 0.12),
        0 8px 16px rgba(24, 22, 18, 0.24);
      filter:
        saturate(1.04)
        contrast(1.03)
        drop-shadow(var(--piece-shadow-x) var(--piece-shadow-y) 7px rgba(18, 17, 14, var(--piece-shadow-alpha)));
      pointer-events: none;
      user-select: none;
    }

    .piece:hover,
    .piece.selected {
      transform:
        translate(-50%, -52%)
        translateZ(46px)
        scale(calc(var(--piece-scale) * 1.06));
    }

    .piece.dragging {
      transition: none;
      cursor: grabbing;
      z-index: 160;
      filter: brightness(1.06);
    }

    .piece.invalid {
      animation: invalid-drop 260ms ease;
    }

    @keyframes invalid-drop {
      0%,
      100% {
        filter: brightness(1);
      }

      45% {
        filter: brightness(1.18) saturate(1.18);
      }
    }

    .probe {
      position: absolute;
      width: 1px;
      height: 1px;
      pointer-events: none;
      opacity: 0;
      z-index: -1;
    }

    .probe-a {
      left: 0;
      top: 0;
    }

    .probe-b {
      right: 0;
      top: 0;
    }

    .probe-c {
      right: 0;
      bottom: 0;
    }

    .probe-d {
      left: 0;
      bottom: 0;
    }

    .panel {
      align-self: stretch;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
      padding: 18px;
      border-radius: 8px;
      background: rgba(244, 240, 231, 0.93);
      border: 1px solid var(--line);
      box-shadow: 0 18px 42px rgba(36, 35, 30, 0.12);
    }

    .readout {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .readout-item {
      min-width: 0;
      padding: 10px;
      border-radius: 8px;
      background: #fbf8f0;
      border: 1px solid var(--line);
    }

    .readout-label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .readout-value {
      font-weight: 800;
      color: var(--panel-strong);
      white-space: nowrap;
    }

    .control-group {
      display: grid;
      gap: 12px;
      padding-top: 2px;
    }

    .group-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      font-size: 15px;
      color: var(--panel-strong);
    }

    .group-title::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 2px;
      background: var(--brass);
      box-shadow: 0 0 0 4px rgba(180, 133, 58, 0.12);
    }

    .control-row {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) 54px;
      gap: 10px;
      align-items: center;
    }

    .control-row label {
      color: var(--muted);
      font-size: 13px;
    }

    .control-value {
      text-align: right;
      color: var(--panel-strong);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--green);
    }

    .stepper {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) 38px;
      gap: 8px;
      align-items: center;
    }

    .round-button {
      display: grid;
      place-items: center;
      width: 38px;
      aspect-ratio: 1;
      border-radius: 8px;
      background: #fbf8f0;
      color: var(--panel-strong);
      border: 1px solid var(--line);
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
      transition: transform 150ms ease, background 150ms ease;
    }

    .round-button:hover {
      transform: translateY(-1px);
      background: #fffdf8;
    }

    .captured {
      display: grid;
      gap: 8px;
      margin-top: auto;
    }

    .captured-line {
      display: grid;
      grid-template-columns: 46px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      min-height: 30px;
    }

    .captured-line span:first-child {
      color: var(--muted);
      font-size: 13px;
      padding-top: 5px;
    }

    .captured-pieces {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .captured-chip {
      display: grid;
      place-items: center;
      width: 26px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #fbf8f0;
      border: 1px solid var(--line);
      color: var(--red);
      font-weight: 800;
      font-size: 13px;
    }

    .captured-chip.green {
      color: var(--green);
    }

    @media (max-width: 980px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .stage {
        min-height: 68vh;
      }

      .scene-space {
        width: min(92vw, 620px);
      }

      .board-plane {
        width: min(86vw, 560px);
      }

      .panel {
        align-self: auto;
      }
    }

    @media (max-width: 620px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .quick-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .action-button {
        flex: 1 1 128px;
      }

      .workspace {
        padding: 12px;
      }

      .stage {
        min-height: 62vh;
      }

      .scene-space {
        min-width: 0;
        width: 96vw;
      }

      .board-plane {
        min-width: 0;
        width: 90vw;
      }

      .panel {
        padding: 14px;
      }

      .readout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">棋</div>
        <div class="brand-title">3D 象棋沙盘</div>
      </div>
      <div class="quick-actions">
        <button class="action-button secondary" id="rulesMode" type="button" aria-pressed="false">象棋玩法</button>
        <button class="action-button secondary" id="resetView" type="button">重置视角</button>
        <button class="action-button" id="resetAll" type="button">归位</button>
      </div>
    </header>

    <main class="workspace">
      <section class="stage" aria-label="象棋棋盘">
        <div class="scene-space" id="sceneSpace">
          <div class="ground-shadow" aria-hidden="true"></div>
          <div class="board-plane" id="boardPlane">
            <img class="board-img" src="棋盘.png" alt="象棋棋盘" draggable="false">
            <div class="pieces-layer" id="piecesLayer"></div>
            <i class="probe probe-a" aria-hidden="true"></i>
            <i class="probe probe-b" aria-hidden="true"></i>
            <i class="probe probe-c" aria-hidden="true"></i>
            <i class="probe probe-d" aria-hidden="true"></i>
          </div>
        </div>
      </section>

      <aside class="panel" aria-label="控制面板">
        <div class="readout" aria-live="polite">
          <div class="readout-item">
            <span class="readout-label">棋盘缩放</span>
            <span class="readout-value" id="boardScaleText">100%</span>
          </div>
          <div class="readout-item">
            <span class="readout-label">棋子缩放</span>
            <span class="readout-value" id="pieceScaleText">100%</span>
          </div>
          <div class="readout-item">
            <span class="readout-label">页面缩放</span>
            <span class="readout-value" id="pageScaleText">100%</span>
          </div>
          <div class="readout-item">
            <span class="readout-label">旋转角度</span>
            <span class="readout-value" id="rotateText">0 / 0 / 0</span>
          </div>
        </div>

        <div class="control-group">
          <h2 class="group-title">棋盘</h2>
          <div class="stepper">
            <button class="round-button" type="button" data-step="boardScale" data-dir="-1" aria-label="缩小棋盘">-</button>
            <input id="boardScale" type="range" min="70" max="145" value="100" aria-label="棋盘缩放">
            <button class="round-button" type="button" data-step="boardScale" data-dir="1" aria-label="放大棋盘">+</button>
          </div>
          <div class="control-row">
            <label for="rotateX">俯仰</label>
            <input id="rotateX" type="range" min="-22" max="26" value="0">
            <span class="control-value" id="rotateXText">0deg</span>
          </div>
          <div class="control-row">
            <label for="rotateY">左右</label>
            <input id="rotateY" type="range" min="-26" max="26" value="0">
            <span class="control-value" id="rotateYText">0deg</span>
          </div>
          <div class="control-row">
            <label for="rotateZ">平面</label>
            <input id="rotateZ" type="range" min="-36" max="36" value="0">
            <span class="control-value" id="rotateZText">0deg</span>
          </div>
        </div>

        <div class="control-group">
          <h2 class="group-title">棋子</h2>
          <div class="stepper">
            <button class="round-button" type="button" data-step="pieceScale" data-dir="-1" aria-label="缩小棋子">-</button>
            <input id="pieceScale" type="range" min="72" max="160" value="108" aria-label="棋子缩放">
            <button class="round-button" type="button" data-step="pieceScale" data-dir="1" aria-label="放大棋子">+</button>
          </div>
        </div>

        <div class="control-group">
          <h2 class="group-title">页面</h2>
          <div class="stepper">
            <button class="round-button" type="button" data-step="pageScale" data-dir="-1" aria-label="缩小页面">-</button>
            <input id="pageScale" type="range" min="78" max="122" value="100" aria-label="页面缩放">
            <button class="round-button" type="button" data-step="pageScale" data-dir="1" aria-label="放大页面">+</button>
          </div>
        </div>

        <div class="captured" aria-label="已移除棋子">
          <div class="captured-line">
            <span>红方</span>
            <div class="captured-pieces" id="capturedRed"></div>
          </div>
          <div class="captured-line">
            <span>绿方</span>
            <div class="captured-pieces" id="capturedGreen"></div>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script>
    (() => {
      const STORAGE_KEY = "xiangqi-3d-board-state-v1";
      const BOARD_SIZE = { width: 1055, height: 1491 };
      const GRID_X = [159, 257, 350, 441, 526, 613, 703, 795, 893].map((value) => value / BOARD_SIZE.width);
      const GRID_Y = [231, 335, 444, 555, 686, 812, 938, 1056, 1165, 1281].map((value) => value / BOARD_SIZE.height);

      const defaultView = {
        rotateX: 0,
        rotateY: 0,
        rotateZ: 0,
        boardScale: 1,
        pieceScale: 1.08,
        pageScale: 1
      };

      const setup = [
        ["g-r0", "green", "绿_车.png", "车", 0, 0],
        ["g-n0", "green", "绿_马.png", "马", 1, 0],
        ["g-e0", "green", "绿_相.png", "相", 2, 0],
        ["g-a0", "green", "绿_士.png", "士", 3, 0],
        ["g-k0", "green", "绿_将.png", "将", 4, 0],
        ["g-a1", "green", "绿_士.png", "士", 5, 0],
        ["g-e1", "green", "绿_相.png", "相", 6, 0],
        ["g-n1", "green", "绿_马.png", "马", 7, 0],
        ["g-r1", "green", "绿_车.png", "车", 8, 0],
        ["g-c0", "green", "绿_炮.png", "炮", 1, 2],
        ["g-c1", "green", "绿_炮.png", "炮", 7, 2],
        ["g-p0", "green", "绿_卒.png", "卒", 0, 3],
        ["g-p1", "green", "绿_卒.png", "卒", 2, 3],
        ["g-p2", "green", "绿_卒.png", "卒", 4, 3],
        ["g-p3", "green", "绿_卒.png", "卒", 6, 3],
        ["g-p4", "green", "绿_卒.png", "卒", 8, 3],
        ["r-r0", "red", "红_车.png", "车", 0, 9],
        ["r-n0", "red", "红_马.png", "马", 1, 9],
        ["r-e0", "red", "红_相.png", "相", 2, 9],
        ["r-a0", "red", "红_仕.png", "仕", 3, 9],
        ["r-k0", "red", "红_帅.png", "帅", 4, 9],
        ["r-a1", "red", "红_仕.png", "仕", 5, 9],
        ["r-e1", "red", "红_相.png", "相", 6, 9],
        ["r-n1", "red", "红_马.png", "马", 7, 9],
        ["r-r1", "red", "红_车.png", "车", 8, 9],
        ["r-c0", "red", "红_炮.png", "炮", 1, 7],
        ["r-c1", "red", "红_炮.png", "炮", 7, 7],
        ["r-p0", "red", "红_兵.png", "兵", 0, 6],
        ["r-p1", "red", "红_兵.png", "兵", 2, 6],
        ["r-p2", "red", "红_兵.png", "兵", 4, 6],
        ["r-p3", "red", "红_兵.png", "兵", 6, 6],
        ["r-p4", "red", "红_兵.png", "兵", 8, 6]
      ];

      const els = {
        root: document.documentElement,
        sceneSpace: document.querySelector("#sceneSpace"),
        boardPlane: document.querySelector("#boardPlane"),
        piecesLayer: document.querySelector("#piecesLayer"),
        rulesMode: document.querySelector("#rulesMode"),
        resetAll: document.querySelector("#resetAll"),
        resetView: document.querySelector("#resetView"),
        capturedRed: document.querySelector("#capturedRed"),
        capturedGreen: document.querySelector("#capturedGreen"),
        boardScale: document.querySelector("#boardScale"),
        pieceScale: document.querySelector("#pieceScale"),
        pageScale: document.querySelector("#pageScale"),
        rotateX: document.querySelector("#rotateX"),
        rotateY: document.querySelector("#rotateY"),
        rotateZ: document.querySelector("#rotateZ"),
        boardScaleText: document.querySelector("#boardScaleText"),
        pieceScaleText: document.querySelector("#pieceScaleText"),
        pageScaleText: document.querySelector("#pageScaleText"),
        rotateText: document.querySelector("#rotateText"),
        rotateXText: document.querySelector("#rotateXText"),
        rotateYText: document.querySelector("#rotateYText"),
        rotateZText: document.querySelector("#rotateZText")
      };

      let saveTimer = 0;
      let dragState = null;
      let rotateState = null;
      let suppressSave = false;
      let shouldPersistOnUnload = Boolean(localStorage.getItem(STORAGE_KEY));
      let state = loadState();

      function createDefaultPieces() {
        return setup.map(([id, side, file, mark, col, row]) => ({
          id,
          side,
          file,
          mark,
          col,
          row,
          captured: false
        }));
      }

      function loadState() {
        const fallback = { view: { ...defaultView }, pieces: createDefaultPieces(), rulesMode: false };
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return fallback;
          const parsed = JSON.parse(raw);
          const defaultsById = new Map(createDefaultPieces().map((piece) => [piece.id, piece]));
          const loadedPieces = Array.isArray(parsed.pieces) ? parsed.pieces : [];
          const pieces = createDefaultPieces().map((piece) => {
            const loaded = loadedPieces.find((item) => item && item.id === piece.id);
            if (!loaded) return piece;
            const base = defaultsById.get(piece.id) || piece;
            return {
              ...base,
              col: clampInt(loaded.col, 0, 8, base.col),
              row: clampInt(loaded.row, 0, 9, base.row),
              captured: Boolean(loaded.captured)
            };
          });
          return {
            view: {
              rotateX: clampNumber(parsed.view?.rotateX, -22, 26, defaultView.rotateX),
              rotateY: clampNumber(parsed.view?.rotateY, -26, 26, defaultView.rotateY),
              rotateZ: clampNumber(parsed.view?.rotateZ, -36, 36, defaultView.rotateZ),
              boardScale: clampNumber(parsed.view?.boardScale, 0.7, 1.45, defaultView.boardScale),
              pieceScale: clampNumber(parsed.view?.pieceScale, 0.72, 1.6, defaultView.pieceScale),
              pageScale: clampNumber(parsed.view?.pageScale, 0.78, 1.22, defaultView.pageScale)
            },
            pieces,
            rulesMode: Boolean(parsed.rulesMode)
          };
        } catch (error) {
          return fallback;
        }
      }

      function saveState() {
        if (suppressSave) return;
        shouldPersistOnUnload = true;
        window.clearTimeout(saveTimer);
        saveTimer = window.setTimeout(() => {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({
            view: state.view,
            rulesMode: state.rulesMode,
            pieces: state.pieces.map(({ id, col, row, captured }) => ({ id, col, row, captured }))
          }));
        }, 120);
      }

      function clampNumber(value, min, max, fallback) {
        const number = Number(value);
        if (!Number.isFinite(number)) return fallback;
        return Math.min(max, Math.max(min, number));
      }

      function clampInt(value, min, max, fallback) {
        return Math.round(clampNumber(value, min, max, fallback));
      }

      function percent(value) {
        return `${Math.round(value * 100)}%`;
      }

      function pointFor(col, row) {
        return {
          x: GRID_X[col] * 100,
          y: GRID_Y[row] * 100
        };
      }

      function nearestGrid(localX, localY) {
        const width = els.boardPlane.offsetWidth;
        const height = els.boardPlane.offsetHeight;
        let best = { col: 0, row: 0, score: Number.POSITIVE_INFINITY };
        GRID_X.forEach((x, col) => {
          GRID_Y.forEach((y, row) => {
            const dx = localX - x * width;
            const dy = localY - y * height;
            const score = dx * dx + dy * dy;
            if (score < best.score) best = { col, row, score };
          });
        });
        return best;
      }

      function renderPieces() {
        const existing = new Map(Array.from(els.piecesLayer.children).map((node) => [node.dataset.id, node]));
        state.pieces.forEach((piece) => {
          let node = existing.get(piece.id);
          if (!node) {
            node = document.createElement("div");
            node.className = "piece";
            node.dataset.id = piece.id;
            node.dataset.side = piece.side;
            node.dataset.mark = piece.mark;
            node.setAttribute("role", "button");
            node.setAttribute("aria-label", `${piece.side === "red" ? "红" : "绿"}方${piece.mark}`);
            const img = document.createElement("img");
            img.className = "piece-art";
            img.src = piece.file;
            img.alt = "";
            img.draggable = false;
            node.appendChild(img);
            node.addEventListener("pointerdown", startPieceDrag);
            els.piecesLayer.appendChild(node);
          }

          existing.delete(piece.id);
          node.hidden = piece.captured;
          node.classList.toggle("selected", dragState?.pieceId === piece.id);
          const point = dragState?.pieceId === piece.id && dragState.freePoint
            ? dragState.freePoint
            : pointFor(piece.col, piece.row);
          node.style.left = `${point.x}%`;
          node.style.top = `${point.y}%`;
          node.style.setProperty("--row-index", String(piece.row));
        });
        existing.forEach((node) => node.remove());
        renderCaptured();
      }

      function renderCaptured() {
        const captured = state.pieces.filter((piece) => piece.captured);
        els.capturedRed.innerHTML = "";
        els.capturedGreen.innerHTML = "";
        captured.forEach((piece) => {
          const chip = document.createElement("span");
          chip.className = `captured-chip ${piece.side}`;
          chip.textContent = piece.mark;
          chip.title = `${piece.side === "red" ? "红" : "绿"}方${piece.mark}`;
          (piece.side === "red" ? els.capturedRed : els.capturedGreen).appendChild(chip);
        });
      }

      function renderView() {
        const view = state.view;
        els.root.style.setProperty("--rotate-x", `${view.rotateX}deg`);
        els.root.style.setProperty("--rotate-y", `${view.rotateY}deg`);
        els.root.style.setProperty("--rotate-z", `${view.rotateZ}deg`);
        els.root.style.setProperty("--board-scale", view.boardScale.toFixed(3));
        els.root.style.setProperty("--piece-scale", view.pieceScale.toFixed(3));
        els.root.style.setProperty("--page-scale", view.pageScale.toFixed(3));
        updateShadowVariables();
        syncControls();
        syncRulesMode();
      }

      function updateShadowVariables() {
        const { rotateX, rotateY, rotateZ } = state.view;
        const shadowX = 18 + rotateY * 0.55;
        const shadowY = 24 + Math.abs(rotateX) * 0.42;
        const shadowScaleX = 1 - Math.min(0.22, Math.abs(rotateY) / 140);
        const shadowScaleY = 0.74 - Math.min(0.2, Math.abs(rotateX) / 160);
        const shadowAlpha = 0.28 + Math.min(0.2, (Math.abs(rotateX) + Math.abs(rotateY)) / 210);
        const pieceShadowX = 7 + rotateY * 0.22;
        const pieceShadowY = 12 + rotateX * 0.15;
        const pieceShadowAlpha = 0.3 + Math.min(0.22, (Math.abs(rotateX) + Math.abs(rotateY)) / 160);
        els.root.style.setProperty("--shadow-x", `${shadowX.toFixed(1)}px`);
        els.root.style.setProperty("--shadow-y", `${shadowY.toFixed(1)}px`);
        els.root.style.setProperty("--shadow-scale-x", shadowScaleX.toFixed(3));
        els.root.style.setProperty("--shadow-scale-y", shadowScaleY.toFixed(3));
        els.root.style.setProperty("--shadow-alpha", shadowAlpha.toFixed(3));
        els.root.style.setProperty("--shadow-rotate", `${(rotateZ * 0.42).toFixed(1)}deg`);
        els.root.style.setProperty("--piece-shadow-x", `${pieceShadowX.toFixed(1)}px`);
        els.root.style.setProperty("--piece-shadow-y", `${pieceShadowY.toFixed(1)}px`);
        els.root.style.setProperty("--piece-shadow-alpha", pieceShadowAlpha.toFixed(3));
      }

      function syncControls() {
        els.boardScale.value = Math.round(state.view.boardScale * 100);
        els.pieceScale.value = Math.round(state.view.pieceScale * 100);
        els.pageScale.value = Math.round(state.view.pageScale * 100);
        els.rotateX.value = Math.round(state.view.rotateX);
        els.rotateY.value = Math.round(state.view.rotateY);
        els.rotateZ.value = Math.round(state.view.rotateZ);
        els.boardScaleText.textContent = percent(state.view.boardScale);
        els.pieceScaleText.textContent = percent(state.view.pieceScale);
        els.pageScaleText.textContent = percent(state.view.pageScale);
        els.rotateText.textContent = `${Math.round(state.view.rotateX)} / ${Math.round(state.view.rotateY)} / ${Math.round(state.view.rotateZ)}`;
        els.rotateXText.textContent = `${Math.round(state.view.rotateX)}deg`;
        els.rotateYText.textContent = `${Math.round(state.view.rotateY)}deg`;
        els.rotateZText.textContent = `${Math.round(state.view.rotateZ)}deg`;
      }

      function syncRulesMode() {
        els.rulesMode.classList.toggle("toggle-active", state.rulesMode);
        els.rulesMode.setAttribute("aria-pressed", String(state.rulesMode));
      }

      function setViewValue(key, value, shouldSave = true) {
        const ranges = {
          rotateX: [-22, 26],
          rotateY: [-26, 26],
          rotateZ: [-36, 36],
          boardScale: [0.7, 1.45],
          pieceScale: [0.72, 1.6],
          pageScale: [0.78, 1.22]
        };
        const [min, max] = ranges[key];
        state.view[key] = clampNumber(value, min, max, state.view[key]);
        renderView();
        if (shouldSave) saveState();
      }

      function startPieceDrag(event) {
        if (event.button !== 0 && event.pointerType !== "touch") return;
        event.preventDefault();
        event.stopPropagation();
        const pieceId = event.currentTarget.dataset.id;
        const piece = state.pieces.find((item) => item.id === pieceId);
        if (!piece || piece.captured) return;
        const local = screenToBoard(event.clientX, event.clientY);
        const current = pointFor(piece.col, piece.row);
        const width = els.boardPlane.offsetWidth;
        const height = els.boardPlane.offsetHeight;
        dragState = {
          pieceId,
          originalCol: piece.col,
          originalRow: piece.row,
          offsetX: local.x - current.x * width / 100,
          offsetY: local.y - current.y * height / 100,
          freePoint: current
        };
        els.boardPlane.classList.add("dragging");
        event.currentTarget.classList.add("dragging");
        event.currentTarget.setPointerCapture(event.pointerId);
        window.addEventListener("pointermove", movePieceDrag);
        window.addEventListener("pointerup", endPieceDrag, { once: true });
      }

      function movePieceDrag(event) {
        if (!dragState) return;
        const local = screenToBoard(event.clientX, event.clientY);
        const width = els.boardPlane.offsetWidth;
        const height = els.boardPlane.offsetHeight;
        const x = clampNumber(local.x - dragState.offsetX, 0, width, width / 2);
        const y = clampNumber(local.y - dragState.offsetY, 0, height, height / 2);
        dragState.freePoint = { x: x / width * 100, y: y / height * 100 };
        renderPieces();
      }

      function endPieceDrag(event) {
        if (!dragState) return;
        const piece = state.pieces.find((item) => item.id === dragState.pieceId);
        const activeNode = document.querySelector(`.piece[data-id="${dragState.pieceId}"]`);
        if (activeNode) {
          activeNode.classList.remove("dragging");
          try {
            activeNode.releasePointerCapture(event.pointerId);
          } catch (error) {
            // Some browsers release capture automatically on pointerup.
          }
        }

        if (piece && dragState.freePoint) {
          const width = els.boardPlane.offsetWidth;
          const height = els.boardPlane.offsetHeight;
          const drop = nearestGrid(dragState.freePoint.x / 100 * width, dragState.freePoint.y / 100 * height);
          const occupant = state.pieces.find((item) =>
            item.id !== piece.id &&
            !item.captured &&
            item.col === drop.col &&
            item.row === drop.row
          );

          const isSamePoint = drop.col === dragState.originalCol && drop.row === dragState.originalRow;
          const isLegal = !state.rulesMode || isLegalMove(piece, drop.col, drop.row, occupant);

          if (isSamePoint) {
            piece.col = dragState.originalCol;
            piece.row = dragState.originalRow;
          } else if (occupant?.side === piece.side || !isLegal) {
            piece.col = dragState.originalCol;
            piece.row = dragState.originalRow;
            flashInvalid(piece.id);
          } else {
            if (occupant) occupant.captured = true;
            piece.col = drop.col;
            piece.row = drop.row;
            saveState();
          }
        }

        dragState = null;
        els.boardPlane.classList.remove("dragging");
        window.removeEventListener("pointermove", movePieceDrag);
        renderPieces();
      }

      function flashInvalid(pieceId) {
        const node = document.querySelector(`.piece[data-id="${pieceId}"]`);
        if (!node) return;
        node.classList.remove("invalid");
        void node.offsetWidth;
        node.classList.add("invalid");
        window.setTimeout(() => node.classList.remove("invalid"), 280);
      }

      function isLegalMove(piece, toCol, toRow, target) {
        if (toCol < 0 || toCol > 8 || toRow < 0 || toRow > 9) return false;
        if (target?.side === piece.side) return false;
        const fromCol = piece.col;
        const fromRow = piece.row;
        const dc = toCol - fromCol;
        const dr = toRow - fromRow;
        const absCol = Math.abs(dc);
        const absRow = Math.abs(dr);
        let legal = false;

        if (piece.mark === "车") {
          legal = (dc === 0 || dr === 0) && piecesBetween(fromCol, fromRow, toCol, toRow) === 0;
        } else if (piece.mark === "马") {
          const leg = absCol === 2
            ? { col: fromCol + Math.sign(dc), row: fromRow }
            : { col: fromCol, row: fromRow + Math.sign(dr) };
          legal = ((absCol === 2 && absRow === 1) || (absCol === 1 && absRow === 2)) && !pieceAt(leg.col, leg.row);
        } else if (piece.mark === "相") {
          const eye = { col: fromCol + dc / 2, row: fromRow + dr / 2 };
          const staysOwnSide = piece.side === "red" ? toRow >= 5 : toRow <= 4;
          legal = absCol === 2 && absRow === 2 && staysOwnSide && !pieceAt(eye.col, eye.row);
        } else if (piece.mark === "仕" || piece.mark === "士") {
          legal = absCol === 1 && absRow === 1 && inPalace(piece.side, toCol, toRow);
        } else if (piece.mark === "帅" || piece.mark === "将") {
          const flyingGeneral = target && (target.mark === "帅" || target.mark === "将") && dc === 0 && piecesBetween(fromCol, fromRow, toCol, toRow) === 0;
          const palaceStep = absCol + absRow === 1 && inPalace(piece.side, toCol, toRow);
          legal = flyingGeneral || palaceStep;
        } else if (piece.mark === "炮") {
          const between = piecesBetween(fromCol, fromRow, toCol, toRow);
          legal = (dc === 0 || dr === 0) && (target ? between === 1 : between === 0);
        } else if (piece.mark === "兵" || piece.mark === "卒") {
          const forward = piece.side === "red" ? -1 : 1;
          const crossedRiver = piece.side === "red" ? fromRow <= 4 : fromRow >= 5;
          legal = (dc === 0 && dr === forward) || (crossedRiver && absCol === 1 && dr === 0);
        }

        return legal && !wouldGeneralsFace(piece, toCol, toRow, target);
      }

      function pieceAt(col, row, pieces = state.pieces) {
        return pieces.find((piece) => !piece.captured && piece.col === col && piece.row === row);
      }

      function piecesBetween(fromCol, fromRow, toCol, toRow, pieces = state.pieces) {
        if (fromCol !== toCol && fromRow !== toRow) return Number.POSITIVE_INFINITY;
        let count = 0;
        if (fromCol === toCol) {
          const min = Math.min(fromRow, toRow);
          const max = Math.max(fromRow, toRow);
          for (const piece of pieces) {
            if (!piece.captured && piece.col === fromCol && piece.row > min && piece.row < max) count++;
          }
        } else {
          const min = Math.min(fromCol, toCol);
          const max = Math.max(fromCol, toCol);
          for (const piece of pieces) {
            if (!piece.captured && piece.row === fromRow && piece.col > min && piece.col < max) count++;
          }
        }
        return count;
      }

      function inPalace(side, col, row) {
        if (col < 3 || col > 5) return false;
        return side === "red" ? row >= 7 && row <= 9 : row >= 0 && row <= 2;
      }

      function wouldGeneralsFace(movingPiece, toCol, toRow, capturedTarget) {
        const simulated = state.pieces
          .filter((piece) => !piece.captured && piece.id !== capturedTarget?.id)
          .map((piece) => piece.id === movingPiece.id ? { ...piece, col: toCol, row: toRow } : piece);
        const redGeneral = simulated.find((piece) => piece.mark === "帅");
        const greenGeneral = simulated.find((piece) => piece.mark === "将");
        if (!redGeneral || !greenGeneral || redGeneral.col !== greenGeneral.col) return false;
        return piecesBetween(redGeneral.col, redGeneral.row, greenGeneral.col, greenGeneral.row, simulated) === 0;
      }

      function startBoardRotate(event) {
        if (event.button !== 0 && event.pointerType !== "touch") return;
        if (event.target.closest(".piece")) return;
        event.preventDefault();
        rotateState = {
          pointerId: event.pointerId,
          startX: event.clientX,
          startY: event.clientY,
          rotateX: state.view.rotateX,
          rotateY: state.view.rotateY
        };
        els.boardPlane.classList.add("rotating");
        els.boardPlane.setPointerCapture(event.pointerId);
        window.addEventListener("pointermove", moveBoardRotate);
        window.addEventListener("pointerup", endBoardRotate, { once: true });
      }

      function moveBoardRotate(event) {
        if (!rotateState) return;
        const dx = event.clientX - rotateState.startX;
        const dy = event.clientY - rotateState.startY;
        state.view.rotateY = clampNumber(rotateState.rotateY + dx * 0.12, -26, 26, rotateState.rotateY);
        state.view.rotateX = clampNumber(rotateState.rotateX - dy * 0.1, -22, 26, rotateState.rotateX);
        renderView();
      }

      function endBoardRotate(event) {
        if (!rotateState) return;
        try {
          els.boardPlane.releasePointerCapture(event.pointerId);
        } catch (error) {
          // Capture may already be released after touch gestures finish.
        }
        rotateState = null;
        els.boardPlane.classList.remove("rotating");
        window.removeEventListener("pointermove", moveBoardRotate);
        saveState();
      }

      function screenToBoard(clientX, clientY) {
        const probes = [".probe-a", ".probe-b", ".probe-c", ".probe-d"].map((selector) => {
          const rect = els.boardPlane.querySelector(selector).getBoundingClientRect();
          return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        });
        const width = els.boardPlane.offsetWidth;
        const height = els.boardPlane.offsetHeight;
        const local = [
          { x: 0, y: 0 },
          { x: width, y: 0 },
          { x: width, y: height },
          { x: 0, y: height }
        ];
        const matrix = homography(probes, local);
        const mapped = applyHomography(matrix, { x: clientX, y: clientY });
        return {
          x: clampNumber(mapped.x, -width * 0.1, width * 1.1, width / 2),
          y: clampNumber(mapped.y, -height * 0.1, height * 1.1, height / 2)
        };
      }

      function homography(src, dst) {
        const matrix = [];
        const vector = [];
        for (let i = 0; i < 4; i++) {
          const { x, y } = src[i];
          const { x: u, y: v } = dst[i];
          matrix.push([x, y, 1, 0, 0, 0, -u * x, -u * y]);
          vector.push(u);
          matrix.push([0, 0, 0, x, y, 1, -v * x, -v * y]);
          vector.push(v);
        }
        const result = solveLinearSystem(matrix, vector);
        return [
          result[0], result[1], result[2],
          result[3], result[4], result[5],
          result[6], result[7], 1
        ];
      }

      function solveLinearSystem(matrix, vector) {
        const n = vector.length;
        const augmented = matrix.map((row, index) => [...row, vector[index]]);
        for (let col = 0; col < n; col++) {
          let pivot = col;
          for (let row = col + 1; row < n; row++) {
            if (Math.abs(augmented[row][col]) > Math.abs(augmented[pivot][col])) pivot = row;
          }
          [augmented[col], augmented[pivot]] = [augmented[pivot], augmented[col]];
          const divisor = augmented[col][col] || 1;
          for (let cell = col; cell <= n; cell++) augmented[col][cell] /= divisor;
          for (let row = 0; row < n; row++) {
            if (row === col) continue;
            const factor = augmented[row][col];
            for (let cell = col; cell <= n; cell++) {
              augmented[row][cell] -= factor * augmented[col][cell];
            }
          }
        }
        return augmented.map((row) => row[n]);
      }

      function applyHomography(matrix, point) {
        const denominator = matrix[6] * point.x + matrix[7] * point.y + matrix[8];
        return {
          x: (matrix[0] * point.x + matrix[1] * point.y + matrix[2]) / denominator,
          y: (matrix[3] * point.x + matrix[4] * point.y + matrix[5]) / denominator
        };
      }

      function bindControls() {
        els.boardScale.addEventListener("input", (event) => setViewValue("boardScale", Number(event.target.value) / 100));
        els.pieceScale.addEventListener("input", (event) => setViewValue("pieceScale", Number(event.target.value) / 100));
        els.pageScale.addEventListener("input", (event) => setViewValue("pageScale", Number(event.target.value) / 100));
        els.rotateX.addEventListener("input", (event) => setViewValue("rotateX", Number(event.target.value)));
        els.rotateY.addEventListener("input", (event) => setViewValue("rotateY", Number(event.target.value)));
        els.rotateZ.addEventListener("input", (event) => setViewValue("rotateZ", Number(event.target.value)));

        document.querySelectorAll("[data-step]").forEach((button) => {
          button.addEventListener("click", () => {
            const key = button.dataset.step;
            const dir = Number(button.dataset.dir);
            const step = key === "pageScale" ? 0.04 : 0.06;
            setViewValue(key, state.view[key] + dir * step);
          });
        });

        els.resetView.addEventListener("click", () => {
          state.view = { ...defaultView };
          renderView();
          saveState();
        });

        els.rulesMode.addEventListener("click", () => {
          state.rulesMode = !state.rulesMode;
          syncRulesMode();
          saveState();
        });

        els.resetAll.addEventListener("click", () => {
          suppressSave = true;
          shouldPersistOnUnload = false;
          window.clearTimeout(saveTimer);
          localStorage.removeItem(STORAGE_KEY);
          state = { view: { ...defaultView }, pieces: createDefaultPieces(), rulesMode: false };
          dragState = null;
          rotateState = null;
          renderView();
          renderPieces();
          requestAnimationFrame(() => {
            suppressSave = false;
          });
        });

        els.boardPlane.addEventListener("pointerdown", startBoardRotate);
        window.addEventListener("beforeunload", () => {
          if (!suppressSave && shouldPersistOnUnload) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
              view: state.view,
              rulesMode: state.rulesMode,
              pieces: state.pieces.map(({ id, col, row, captured }) => ({ id, col, row, captured }))
            }));
          }
        });
      }

      bindControls();
      renderView();
      renderPieces();
    })();
  </script>
</body>
</html>
